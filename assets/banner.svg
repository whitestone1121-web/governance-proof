<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Governance Proof — route-complete no-bind evidence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070d18"/>
      <stop offset="1" stop-color="#0e1a30"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="900" height="240" rx="18" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="897" height="237" rx="16.5" fill="none" stroke="#16243f" stroke-width="3"/>
  <rect x="0" y="0" width="6" height="240" fill="url(#acc)"/>

  <!-- seal -->
  <g transform="translate(78,120)">
    <polygon points="0,-66 57,-33 57,33 0,66 -57,33 -57,-33" fill="#0b1220" stroke="url(#acc)" stroke-width="4"/>
    <line x1="-40" y1="0" x2="-14" y2="0" stroke="url(#acc)" stroke-width="6" stroke-linecap="round"/>
    <line x1="14" y1="0" x2="40" y2="0" stroke="#33415c" stroke-width="6" stroke-linecap="round" stroke-dasharray="3 8"/>
    <circle cx="0" cy="0" r="18" fill="#0b1220" stroke="url(#acc)" stroke-width="5"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke="url(#acc)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <text x="168" y="104" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="1" fill="#f1f5f9">Governance<tspan fill="#34d399">&#160;Proof</tspan></text>
  <text x="170" y="142" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial,sans-serif" font-size="19" font-weight="500" letter-spacing="1.5" fill="#9fb3c8">route-complete &#183; no-bind receipt &#183; deterministic replay</text>

  <!-- key phrase -->
  <text x="170" y="186" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15.5" fill="#5eead4">the receipt is the proof &#183; the replay is the audit &#183; the prevented consequence is the governance</text>
</svg>
